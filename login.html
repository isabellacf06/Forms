<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="CSS/login.css">
    <title>Forms</title>
</head>

<body>

    <section class="contenedor">

        <form action="" class="formulario">

            <h2>Login</h2>

            <div class="campo">
                <label for="correo">Correo:</label>
                <input type="email" id="correo" placeholder="Ingrese su correo" required>
            </div>

            <div class="campo">
                <label for="clave">Contraseña:</label>
                <input type="password" id="clave" placeholder="Ingrese su contraseña" required>
            </div>

            <div class="campo">
                <input type="submit" value="Ingresar">
                <input type="reset" value="Limpiar">
            </div>

        </form>

        <form action="" class="formulario">

            <h2>Contáctenos</h2>

            <div class="campo">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" placeholder="Ingrese su nombre" required>
            </div>

            <div class="campo">
                <label for="correo2">Correo:</label>
                <input type="email" id="correo2" placeholder="Ingrese su correo" required>
            </div>

            <div class="campo">
                <label for="telefono">Teléfono:</label>
                <input type="number" id="telefono" placeholder="Ingrese su teléfono">
            </div>

            <div class="campo">
                <label for="mensaje">Mensaje:</label>
                <textarea id="mensaje" rows="5"></textarea>
            </div>

            <div class="campo">
                <input type="submit" value="Enviar">
                <input type="reset" value="Limpiar">
            </div>

        </form>

    </section>

</body>

</html>
